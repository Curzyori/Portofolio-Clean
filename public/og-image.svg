<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#121212"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <ellipse cx="600" cy="200" rx="600" ry="300" fill="url(#glow)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#222" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="473" x2="1200" y2="473"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Border frame -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#222" stroke-width="1"/>
  <rect x="48" y="48" width="1104" height="534" fill="none" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Top left: domain -->
  <text x="72" y="96" font-family="monospace" font-size="14" fill="#666">curzy.dev</text>

  <!-- Main content -->
  <!-- Name -->
  <text x="600" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-2">YUKEN VELINO</text>

  <!-- Divider -->
  <line x1="400" y1="310" x2="800" y2="310" stroke="#333" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="600" y="360" font-family="monospace" font-size="20" fill="#888" text-anchor="middle">Full-Stack Developer</text>
  <text x="600" y="395" font-family="monospace" font-size="16" fill="#555" text-anchor="middle">50 Projects Challenge</text>

  <!-- Tech tags -->
  <g font-family="monospace" font-size="12" fill="#58a6ff">
    <rect x="340" y="430" width="90" height="28" rx="14" fill="none" stroke="#58a6ff" stroke-width="1"/>
    <text x="385" y="449" text-anchor="middle">Next.js</text>

    <rect x="445" y="430" width="90" height="28" rx="14" fill="none" stroke="#58a6ff" stroke-width="1"/>
    <text x="490" y="449" text-anchor="middle">TypeScript</text>

    <rect x="550" y="430" width="100" height="28" rx="14" fill="none" stroke="#58a6ff" stroke-width="1"/>
    <text x="600" y="449" text-anchor="middle">React</text>

    <rect x="665" y="430" width="70" height="28" rx="14" fill="none" stroke="#58a6ff" stroke-width="1"/>
    <text x="700" y="449" text-anchor="middle">Python</text>

    <rect x="750" y="430" width="110" height="28" rx="14" fill="none" stroke="#58a6ff" stroke-width="1"/>
    <text x="805" y="449" text-anchor="middle">Supabase</text>
  </g>

  <!-- Bottom: social links -->
  <g fill="#666">
    <!-- GitHub -->
    <path d="M600 530 L600 580 M570 555 L630 555" stroke="#666" stroke-width="1" fill="none"/>
    <text x="600" y="605" font-family="monospace" font-size="12" fill="#666" text-anchor="middle">github.com/Curzyori</text>
  </g>

  <!-- Status badge -->
  <rect x="1050" y="68" width="80" height="24" rx="4" fill="#1a1a1a" stroke="#333"/>
  <text x="1090" y="84" font-family="monospace" font-size="11" fill="#22c55e" text-anchor="middle">● ACTIVE</text>
</svg>
